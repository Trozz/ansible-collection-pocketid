---
# Pocket-ID test instance for the trozz.pocketid integration suite.
#
# Started by scripts/integration-bootstrap.sh. Authentication uses Pocket-ID's
# built-in STATIC_API_KEY: on first authenticated use the server creates an
# admin-scoped user bound to that key, so no database seeding is required. This
# is schema-drift-proof across the v2 and next images.
#
# Pocket-ID v1 is EOL: target the v2 image (pinned/blocking) or :next
# (informational). Override the image with POCKET_ID_IMAGE.
services:
  pocket-id:
    image: ${POCKET_ID_IMAGE:-ghcr.io/pocket-id/pocket-id:v2}
    container_name: pocket-id-test
    restart: "no"
    environment:
      # Public URL for the OIDC provider (required by v2).
      APP_URL: http://localhost:1411
      # Encryption key, required by v2 and must be >= 16 bytes.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-test-ansible-pocketid-encryption-key}
      # Built-in static admin API key (must be >= 16 chars). The integration
      # suite authenticates with exactly this value.
      STATIC_API_KEY: ${POCKETID_STATIC_API_KEY:-test-ansible-pocketid-static-key-0123456789}
      # Trust proxy headers (not needed for local testing).
      TRUST_PROXY: "false"
      # MaxMind license key (not needed for testing).
      MAXMIND_LICENSE_KEY: ""
    ports:
      - "1411:1411"
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
