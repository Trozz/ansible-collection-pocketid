---
# trozz.pocketid.client_secret integration coverage:
# imperative + non-idempotent rotation. check mode performs no rotation; a real
# run returns the new secret exactly once. NOT asserted via converge-twice.
- name: pocketid_client_secret
  module_defaults:
    group/trozz.pocketid.pocketid:
      base_url: "{{ pocketid_base_url }}"
      api_token: "{{ pocketid_api_token }}"
      validate_certs: "{{ pocketid_validate_certs }}"
  vars:
    test_client_name: ansitest_secret_client
  block:
    - name: Create a confidential client to rotate
      trozz.pocketid.client:
        name: "{{ test_client_name }}"
        callback_urls:
          - https://secretapp.example.com/callback
        is_public: false
        state: present
      register: secret_client

    - name: Rotate secret (check mode) - must NOT rotate
      trozz.pocketid.client_secret:
        client_id: "{{ secret_client.client.id }}"
      check_mode: true
      register: rot_check

    - name: Check mode reports changed but returns no secret
      assert:
        that:
          - rot_check is changed
          - rot_check.secret is not defined

    - name: Rotate secret (real run)
      trozz.pocketid.client_secret:
        client_id: "{{ secret_client.client.id }}"
      register: rot_real

    - name: Real run returns a non-empty secret exactly once
      assert:
        that:
          - rot_real is changed
          - rot_real.secret is defined
          - rot_real.secret | length > 0

    - name: Rotate again by name (always changes; not idempotent)
      trozz.pocketid.client_secret:
        name: "{{ test_client_name }}"
      register: rot_by_name

    - name: Name form also rotates and returns a new secret
      assert:
        that:
          - rot_by_name is changed
          - rot_by_name.secret is defined
          - rot_by_name.secret != rot_real.secret

  always:
    - name: Clean up test client
      trozz.pocketid.client:
        name: "{{ test_client_name }}"
        state: absent
      failed_when: false
