---
# Exercises: trozz.pocketid.client_secret (rotate by client_id and by name).
# This is an imperative action module: it is not idempotent and returns the new
# secret exactly once. Check mode performs no rotation.
- name: Rotate Pocket-ID client secrets
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    group/trozz.pocketid.pocketid:
      base_url: "{{ lookup('env', 'POCKETID_BASE_URL') }}"
      api_token: "{{ lookup('env', 'POCKETID_API_TOKEN') }}"
      validate_certs: false
      timeout: 30
  tasks:
    - name: Exercise client secret rotation
      block:
        - name: Create a confidential client to rotate
          trozz.pocketid.client:
            name: Example Secret Client
            callback_urls:
              - https://app.example.com/callback
            is_public: false
            state: present
          register: client

        - name: Rotate in check mode (must not actually rotate)
          trozz.pocketid.client_secret:
            client_id: "{{ client.client.id }}"
          check_mode: true
          register: dry_run

        - name: Assert check mode reports a pending change but mints no secret
          ansible.builtin.assert:
            that:
              - dry_run is changed
              - dry_run.secret is not defined

        - name: Rotate the secret by client id
          trozz.pocketid.client_secret:
            client_id: "{{ client.client.id }}"
          register: by_id

        - name: Rotate the secret by client name
          trozz.pocketid.client_secret:
            name: Example Secret Client
          register: by_name

        - name: Assert each real rotation returned a new secret and reported changed
          ansible.builtin.assert:
            that:
              - by_id is changed
              - by_id.secret is defined
              - by_name is changed
              - by_name.secret is defined
              - by_id.secret != by_name.secret

      always:
        - name: Remove the client
          trozz.pocketid.client:
            id: "{{ client.client.id | default('') }}"
            name: Example Secret Client
            state: absent
          when: client.client.id is defined
