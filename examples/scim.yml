---
# Exercises: trozz.pocketid.scim_service_provider (create, update, delete) for
# an OIDC client, across every option.
- name: Manage Pocket-ID SCIM service providers
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    group/trozz.pocketid.pocketid:
      base_url: "{{ lookup('env', 'POCKETID_BASE_URL') }}"
      api_token: "{{ lookup('env', 'POCKETID_API_TOKEN') }}"
      validate_certs: false
      timeout: 30
  tasks:
    - name: Exercise the SCIM service provider module
      block:
        - name: Create a client to attach the SCIM configuration to
          trozz.pocketid.client:
            name: Example SCIM Client
            callback_urls:
              - https://app.example.com/callback
            is_public: false
            state: present
          register: client

        - name: Create the SCIM service provider with every available option
          trozz.pocketid.scim_service_provider:
            oidc_client_id: "{{ client.client.id }}"
            endpoint: https://scim.example.com/v2
            token: example-bearer-token
            state: present
          register: created

        - name: Re-run unchanged to prove idempotence (token is excluded from diff)
          trozz.pocketid.scim_service_provider:
            oidc_client_id: "{{ client.client.id }}"
            endpoint: https://scim.example.com/v2
            state: present
          register: rerun

        - name: Assert the SCIM provider was created once and is idempotent
          ansible.builtin.assert:
            that:
              - created is changed
              - created.scim_service_provider.id is defined
              - rerun is not changed

        - name: Update the SCIM endpoint, cross-checking the immutable id
          trozz.pocketid.scim_service_provider:
            id: "{{ created.scim_service_provider.id }}"
            oidc_client_id: "{{ client.client.id }}"
            endpoint: https://scim.example.com/v2/updated
            state: present
          register: updated

        - name: Assert the update changed the endpoint
          ansible.builtin.assert:
            that:
              - updated is changed

        - name: Delete the SCIM service provider
          trozz.pocketid.scim_service_provider:
            oidc_client_id: "{{ client.client.id }}"
            state: absent
          register: removed

        - name: Assert the SCIM provider was removed
          ansible.builtin.assert:
            that:
              - removed is changed

      always:
        - name: Remove the client
          trozz.pocketid.client:
            id: "{{ client.client.id | default('') }}"
            name: Example SCIM Client
            state: absent
          when: client.client.id is defined
